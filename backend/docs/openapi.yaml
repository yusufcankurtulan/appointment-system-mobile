openapi: 3.0.3
info:
  title: Barber Appointments API
  version: 0.1.0
  description: API for barbershop appointment booking platform
servers:
  - url: http://localhost:4000
paths:
  /auth/register/customer:
    post:
      summary: Register a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [firstName, lastName, email, phone, password]
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                phone:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Registered

  /auth/register/owner:
    post:
      summary: Submit owner application (pending)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, email, phone, password, shop]
              properties:
                fullName:
                  type: string
                email:
                  type: string
                phone:
                  type: string
                password:
                  type: string
                shop:
                  type: object
                  properties:
                    name:
                      type: string
                    description:
                      type: string
                    city:
                      type: string
                    district:
                      type: string
                    address:
                      type: string
                    latitude:
                      type: number
                    longitude:
                      type: number
      responses:
        '200':
          description: Application submitted

  /auth/login/customer:
    post:
      summary: Customer login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: OK

  /auth/login/owner:
    post:
      summary: Owner login (only approved owners)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: OK

  /auth/refresh:
    post:
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
      responses:
        '200':
          description: New access token

  /auth/logout:
    post:
      summary: Logout (revoke refresh token)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Logged out

  /appointments/request:
    post:
      summary: Request an appointment (customer)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                chairId:
                  type: string
                shopId:
                  type: string
                startAt:
                  type: string
                  format: date-time
                endAt:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Appointment created

  /appointments/{id}/approve:
    patch:
      summary: Approve an appointment (owner)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Approved

  /appointments/{id}/reject:
    patch:
      summary: Reject an appointment (owner)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rejected

  /appointments:
    get:
      summary: List appointments (scoped by role)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK

  /admin/owner-applications:
    get:
      summary: List owner applications (admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK

  /admin/owner-applications/{id}/approve:
    patch:
      summary: Approve owner application (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Approved

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
