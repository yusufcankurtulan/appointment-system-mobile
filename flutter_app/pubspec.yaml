name: barber_app_flutter
description: Flutter mobile app for Barber Appointments
publish_to: 'none'
version: 0.1.0
environment:
  sdk: '>=2.18.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_riverpod: ^2.3.6
  dio: ^5.2.2
  go_router: any
  flutter_secure_storage: ^9.0.0
  firebase_core: ^2.14.0
  firebase_messaging: ^14.8.0
  flutter_local_notifications: any
  geolocator: ^9.0.2
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
