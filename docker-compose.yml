version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: barber_app
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    command: ["npm", "run", "dev"]
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/barber_app?schema=public
      - PORT=4000
    depends_on:
      - postgres
    ports:
      - "4000:4000"

volumes:
  db-data:
